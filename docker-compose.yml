services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        GITHUB_TOKEN: ${GIT_ACCES_TOKEN}
    env_file:
      - .env
      - .config
    ports:
      - "9123:80"
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
      - ./docker-logs/nginx:/var/log/nginx
      - ~/.ssh:/home/www-data/.ssh
      - ./data:/var/www/html/data
      - /var/log:/host/var/log
      - ~/logs:/host/home/logs