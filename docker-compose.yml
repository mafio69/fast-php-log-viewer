services:
  php:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GIT_ACCES_TOKEN}
    env_file:
      - .env
    ports:
      - "9123:80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./data:/var/www/html/data
    environment:
      APP_ENV: development
      LOG_DIR: /var/www/html/logs
