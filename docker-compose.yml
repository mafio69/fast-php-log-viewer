services:
  php:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GIT_ACCES_TOKEN}
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html/app
      - ./logs:/var/www/html/logs
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - ../PhpstormProjects/fast-php-log-viewer/src:/var/www/html/vendor/mafio69/log-viewer/src
      - ../PhpstormProjects/fast-php-log-viewer/index.php:/var/www/html/vendor/mafio69/log-viewer/index.php
    environment:
      APP_ENV: development
      LOG_DIR: /var/www/html/logs
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: secret
      XDEBUG_MODE: debug
      XDEBUG_CLIENT_HOST: host.docker.internal
      motherduck_token: ${DUCK_TOKEN}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
