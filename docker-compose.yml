services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        GITHUB_TOKEN: ${GIT_ACCES_TOKEN}
    env_file:
      - .env
      - .config
    ports: # map host:container
      - "9123:80"
    volumes: # map host:container
      - .:/var/www/html
      - ./docker-logs/nginx:/var/log/nginx
      - /var/log:/host/var/log
      - ~/.ssh:/var/www/.ssh
      - .${LOG_DIR}:/var/www/html/logs
